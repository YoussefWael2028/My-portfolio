<section id="projects" class="bg-[#1a0000] py-20 px-6 md:px-12">
  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <div
      *ngFor="let project of projects"
      class="group relative rounded-lg bg-[#1a0000] overflow-hidden transition-all duration-300 ease-out hover:-translate-y-2 hover:shadow-[0_20px_40px_-15px_rgba(229,62,62,0.35)]"
    >
      <!-- Preview image -->
      <div class="relative overflow-hidden h-48">
        <img
          [src]="project.image"
          [alt]="project.title + ' preview'"
          class="w-full h-full object-cover opacity-80 group-hover:opacity-100 group-hover:scale-105 transition-all duration-500 ease-out"
        />
        <div class="absolute inset-0 bg-gradient-to-t from-[#1a0000] via-transparent to-transparent opacity-60 group-hover:opacity-30 transition-opacity duration-500"></div>
      </div>

      <div class="p-6 relative">
        <div class="flex items-center justify-between mb-2">
          <h3 class="text-lg font-semibold text-[#f0e6e6] group-hover:text-[#e53e3e] transition-colors duration-300">
            {{ project.title }}
          </h3>

          <div class="flex items-center gap-4">

           <a [href]="project.githubUrl"
              target="_blank"
              rel="noopener noreferrer"
              [attr.aria-label]="project.title + ' GitHub repository'"
              class="text-[#a88c8c] hover:text-[#e53e3e] transition-colors"
            >
              <i class="fa-brands fa-square-github text-xl"></i>
            </a>


             <a *ngIf="project.liveUrl"
              [href]="project.liveUrl"
              target="_blank"
              rel="noopener noreferrer"
              [attr.aria-label]="project.title + ' live demo'"
              class="text-[#a88c8c] hover:text-[#e53e3e] transition-colors"
            >
              <i class="fa-solid fa-arrow-up-right-from-square text-lg"></i>
            </a>
          </div>
        </div>

        <p class="text-sm text-[#a88c8c] leading-relaxed mb-4">
          {{ project.description }}
        </p>

        <ul class="flex flex-wrap gap-2">
          <li
            *ngFor="let tag of project.tags"
            class="text-xs font-medium text-[#e2b8b8] bg-[#3a1414] px-3 py-1 rounded-full"
          >
            {{ tag }}
          </li>
        </ul>
      </div>


      <div class="absolute inset-0 rounded-lg pointer-events-none border border-transparent group-hover:border-[#e53e3e]/40 transition-colors duration-300"></div>
    </div>
       <div class="group flex flex-col items-center justify-center text-center py-12 px-6 rounded-lg border-2 border-dashed border-[#3a1414] hover:border-[#e53e3e]/60 transition-colors">
  <div class="flex gap-1.5 mb-4">
    <span class="w-2 h-2 rounded-full bg-[#e53e3e] animate-bounce" style="animation-delay: 0ms"></span>
    <span class="w-2 h-2 rounded-full bg-[#e53e3e] animate-bounce" style="animation-delay: 150ms"></span>
    <span class="w-2 h-2 rounded-full bg-[#e53e3e] animate-bounce" style="animation-delay: 300ms"></span>
  </div>
  <p class="text-sm font-bold uppercase tracking-widest text-[#a88c8c] group-hover:text-[#e53e3e] transition-colors">
    More in the works
  </p>
  <p class="text-xs text-[#a88c8c]/70 mt-2 max-w-[220px] leading-relaxed">
    New projects are brewing — check back soon or peek at my GitHub for what's cooking.
  </p>
</div>

  </div>

</section>
